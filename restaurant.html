<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">View in GoVeggie Malaysia</title>
  <meta name="description" content="Open this restaurant in the GoVeggie Malaysia app. 在 GoVeggie 应用打开。">

  <!-- iOS Smart App Banner — auto shows "View in app" bar when Safari sees this -->
  <meta name="apple-itunes-app" content="app-id=1183783738">

  <!-- OG tags (set dynamically below if restaurant data loads) -->
  <meta id="og-title" property="og:title" content="GoVeggie Malaysia - Restaurant">
  <meta id="og-desc" property="og:description" content="Open this restaurant in the GoVeggie Malaysia app.">
  <meta id="og-image" property="og:image" content="https://goveggiemalaysia.cloud/images/hero-food.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="GoVeggie Malaysia">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-500: #22c55e;
      --green-600: #16a34a;
      --green-700: #15803d;
      --green-800: #166534;
      --neutral-300: #d6d3d1;
      --neutral-500: #78716c;
      --neutral-800: #292524;
      --cream: #fefcf3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--neutral-800);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 25px 50px -12px rgba(0,0,0,0.08);
      max-width: 440px;
      width: 100%;
      overflow: hidden;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .hero-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      object-fit: cover;
      display: block;
    }

    .hero-image.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .body {
      padding: 28px 28px 32px;
      text-align: center;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-row img {
      width: 40px; height: 40px; border-radius: 10px;
    }
    .logo-row .brand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--green-700);
      letter-spacing: -0.3px;
    }

    .restaurant-name {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.25;
      color: var(--neutral-800);
      letter-spacing: -0.5px;
    }

    .restaurant-address {
      font-size: 0.88rem;
      color: var(--neutral-500);
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: #f0eee8;
      margin: 0 0 20px;
    }

    .message {
      font-size: 0.95rem;
      color: var(--neutral-500);
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .message-zh {
      font-size: 0.85rem;
      color: var(--neutral-500);
      opacity: 0.85;
      margin-top: 4px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--green-600);
      color: #fff;
      box-shadow: 0 8px 24px -6px rgba(22,163,74,0.4);
      margin-bottom: 10px;
    }
    .btn-primary:hover { background: var(--green-700); }

    .btn-secondary {
      background: transparent;
      color: var(--green-700);
      border: 2px solid var(--green-600);
    }
    .btn-secondary:hover { background: rgba(22,163,74,0.06); }

    .badges {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .badges a { display: block; }
    .badges img {
      height: 44px;
      border-radius: 6px;
    }

    .loading {
      padding: 60px 32px;
      text-align: center;
      color: var(--neutral-500);
      font-size: 0.9rem;
    }
    .loading .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 2px solid var(--neutral-300);
      border-top-color: var(--green-600);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    .small-link {
      display: block;
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--neutral-500);
      text-decoration: none;
    }
    .small-link:hover { color: var(--green-700); text-decoration: underline; }
  </style>
</head>

<body>
  <div class="card">
    <div id="loading" class="loading">
      <span class="spinner"></span> Loading restaurant info…
    </div>

    <div id="content" class="hidden">
      <img id="hero" class="hero-image placeholder" alt="">
      <div class="body">
        <div class="logo-row">
          <img src="/images/logo.png" alt="">
          <span class="brand">GoVeggie Malaysia</span>
        </div>
        <h1 id="name" class="restaurant-name"></h1>
        <p id="address" class="restaurant-address"></p>
        <div class="divider"></div>
        <p class="message">
          Download the app to view photos, menu &amp; directions.
          <span class="message-zh">下载 App 查看照片、菜单和导航。</span>
        </p>
        <button class="btn btn-primary" onclick="downloadApp()">
          Download App / 下载 App
        </button>
        <div class="badges" style="margin-top:16px">
          <a id="appstore-link" href="https://apps.apple.com/my/app/goveggie-malaysia/id1183783738">
            <img src="/images/badges/app-store-en.svg" alt="Download on the App Store">
          </a>
          <a id="playstore-link" href="https://play.google.com/store/apps/details?id=com.dwhka.msiafoodlog">
            <img src="/images/badges/google-play-en.svg" alt="Get it on Google Play">
          </a>
        </div>
        <a class="small-link" href="/">Visit GoVeggie Website →</a>
      </div>
    </div>

    <div id="fallback" class="hidden">
      <div class="hero-image placeholder">🥬</div>
      <div class="body">
        <div class="logo-row">
          <img src="/images/logo.png" alt="">
          <span class="brand">GoVeggie Malaysia</span>
        </div>
        <h1 class="restaurant-name">Discover Vegetarian Restaurants</h1>
        <p class="restaurant-address">发现马来西亚素食餐厅</p>
        <div class="divider"></div>
        <p class="message">
          Explore 1,800+ veggie &amp; vegan spots across Malaysia.
          <span class="message-zh">探索马来西亚 1,800+ 素食餐厅。</span>
        </p>
        <button class="btn btn-primary" onclick="downloadApp()">
          Download App / 下载 App
        </button>
        <div class="badges" style="margin-top:16px">
          <a href="https://apps.apple.com/my/app/goveggie-malaysia/id1183783738">
            <img src="/images/badges/app-store-en.svg" alt="Download on the App Store">
          </a>
          <a href="https://play.google.com/store/apps/details?id=com.dwhka.msiafoodlog">
            <img src="/images/badges/google-play-en.svg" alt="Get it on Google Play">
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_STORE_URL = 'https://apps.apple.com/my/app/goveggie-malaysia/id1183783738';
    const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.dwhka.msiafoodlog';

    function isIOS() {
      const ua = navigator.userAgent || '';
      return /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }
    function isAndroid() { return /android/i.test(navigator.userAgent || ''); }

    function downloadApp() {
      if (isIOS()) window.location.href = APP_STORE_URL;
      else if (isAndroid()) window.location.href = PLAY_STORE_URL;
      else window.location.href = '/';
    }

    function buildPhotoUrl(legacyPid, filename) {
      if (!legacyPid || !filename) return null;
      // Use the resized thumbnail endpoint we just added (?w=800)
      return `https://goveggiemalaysia.cloud/api/photos/${legacyPid}/${encodeURIComponent(filename)}?w=800`;
    }

    (async function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback').classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('https://goveggiemalaysia.cloud/api/restaurants/' + encodeURIComponent(id));
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();

        const name = data.name || 'Restaurant';
        const address = data.address || '';

        document.getElementById('name').textContent = name;
        document.getElementById('address').textContent = address;
        document.title = name + ' · GoVeggie Malaysia';

        // Hero photo (cover photo or first photo)
        const hero = document.getElementById('hero');
        const cover = data.cover_photo || (data.photos && data.photos[0]);
        const photoUrl = buildPhotoUrl(data.legacy_pid, cover);
        if (photoUrl) {
          hero.src = photoUrl;
          hero.classList.remove('placeholder');
          hero.onerror = () => {
            hero.removeAttribute('src');
            hero.classList.add('placeholder');
            hero.textContent = '🍽️';
          };
        } else {
          hero.classList.add('placeholder');
          hero.textContent = '🍽️';
        }

        // Update OG tags
        document.getElementById('og-title').setAttribute('content', name + ' · GoVeggie Malaysia');
        document.getElementById('og-desc').setAttribute('content', address || 'Vegetarian restaurant in Malaysia');
        if (photoUrl) {
          document.getElementById('og-image').setAttribute('content', photoUrl);
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback').classList.remove('hidden');
      }
    })();
  </script>
</body>

</html>
